build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
    ignoreAnnotated:
      - 'Composable'
  ComplexMethod:
    threshold: 15
  TooManyFunctions:
    thresholdInFiles: 15
    thresholdInClasses: 15

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9]*'

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
  ReturnCount:
    max: 3
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true

formatting:
  active: false
